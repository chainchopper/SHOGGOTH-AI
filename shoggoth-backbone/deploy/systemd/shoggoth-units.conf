# Shoggoth Mesh Machine — Systemd Unit Files
#
# For bare-metal Linux deployment on the Xeon 6240 host and BC250 APU nodes.
# Copy to /etc/systemd/system/ and enable with:
#   sudo systemctl enable --now shoggoth-orchestrator
#   sudo systemctl enable --now shoggoth-node-agent

# ── Shoggoth Orchestrator ──────────────────────────────────────────────────────
[Unit]
Description=Shoggoth Mesh Machine — Orchestrator
Documentation=https://github.com/chainchopper/shoggoth-backbone
After=network-online.target scylla-server.service
Wants=network-online.target scylla-server.service

[Service]
Type=simple
User=shoggoth
Group=shoggoth
WorkingDirectory=/opt/shoggoth
ExecStart=/opt/shoggoth/bin/shoggoth-orchestrator
Restart=always
RestartSec=5
LimitNOFILE=65536
LimitMEMLOCK=infinity
AmbientCapabilities=CAP_SYS_ADMIN CAP_SYS_NICE CAP_NET_RAW CAP_IPC_LOCK
Environment=RUST_LOG=shoggoth=info
Environment=SHOGGOTH_DISCOVERY_ADDR=0.0.0.0:8888

# Resource limits for the Xeon 6240 (72 threads, 512 GB RAM).
CPUQuota=6400%
MemoryMax=256G

# HugeTLB pages for DMA-BUF.
LimitMEMLOCK=infinity

# Restart if the process exits or is killed.
RestartForceExitStatus=SIGKILL
SuccessExitStatus=SIGTERM

[Install]
WantedBy=multi-user.target

# ── Shoggoth Node Agent ────────────────────────────────────────────────────────
[Unit]
Description=Shoggoth Mesh Machine — Node Agent
Documentation=https://github.com/chainchopper/shoggoth-backbone
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
User=shoggoth
Group=shoggoth
WorkingDirectory=/opt/shoggoth
ExecStart=/opt/shoggoth/bin/shoggoth-node-agent
Restart=always
RestartSec=5
LimitNOFILE=65536
LimitMEMLOCK=infinity
AmbientCapabilities=CAP_SYS_ADMIN CAP_NET_RAW CAP_IPC_LOCK
Environment=RUST_LOG=shoggoth=info
Environment=SHOGGOTH_NODE_ID=%H
Environment=SHOGGOTH_ORCHESTRATOR_ADDR=xeon-brain-01:9100

# GPU access.
DeviceAllow=/dev/dri rw
DeviceAllow=/dev/nvidia0 rw
DeviceAllow=/dev/nvidiactl rw
DeviceAllow=/dev/nvidia-uvm rw

[Install]
WantedBy=multi-user.target

# ── ScyllaDB Server ────────────────────────────────────────────────────────────
[Unit]
Description=ScyllaDB NoSQL Database
Documentation=https://docs.scylladb.com
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
User=scylla
Group=scylla
ExecStart=/usr/bin/scylla --smp=72 --memory=128G --developer-mode=0
ExecStop=/usr/bin/nodetool drain
Restart=always
RestartSec=10
LimitNOFILE=1048576
LimitMEMLOCK=infinity
LimitCORE=infinity
CPUQuota=6500%
MemoryMax=192G

[Install]
WantedBy=multi-user.target

# ── NPU-STACK FastAPI Service ──────────────────────────────────────────────────
[Unit]
Description=NPU-STACK — Shoggoth ML Inference & Training Hub
Documentation=https://github.com/chainchopper/npu-stack
After=network-online.target shoggoth-orchestrator.service
Wants=network-online.target shoggoth-orchestrator.service

[Service]
Type=simple
User=shoggoth
Group=shoggoth
WorkingDirectory=/opt/shoggoth/npu-stack
ExecStart=/opt/shoggoth/npu-stack/.venv/bin/uvicorn backend.main:app --host 0.0.0.0 --port 8100 --workers 4
Restart=always
RestartSec=5
Environment=SHOGGOTH_ORCHESTRATOR_ADDR=localhost:9100
Environment=PYTHONUNBUFFERED=1

[Install]
WantedBy=multi-user.target

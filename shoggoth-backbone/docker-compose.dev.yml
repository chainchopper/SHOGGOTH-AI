# Shoggoth Mesh Machine — Developer Compose
#
# Lightweight development setup with orchestrator + 2 simulated nodes.
# No ScyllaDB, no NPU-STACK. Just the core fabric for local dev.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d

version: "3.9"

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: shoggoth-dev-orchestrator
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /dev/dri:/dev/dri:ro
      - /dev/shm/shoggoth:/dev/shm/shoggoth
    environment:
      - SHOGGOTH_ROLE=orchestrator
      - RUST_LOG=shoggoth=debug,shoggoth_orchestrator=trace
      - SHOGGOTH_DISCOVERY_ADDR=0.0.0.0:8888

  node-agent-1:
    build:
      context: .
      dockerfile: Dockerfile.node-agent
    container_name: shoggoth-dev-node-1
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /dev/dri:/dev/dri:ro
    environment:
      - SHOGGOTH_NODE_ID=dev-node-01
      - SHOGGOTH_ORCHESTRATOR_ADDR=localhost:9100
      - RUST_LOG=shoggoth=debug

  node-agent-2:
    build:
      context: .
      dockerfile: Dockerfile.node-agent
    container_name: shoggoth-dev-node-2
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /dev/dri:/dev/dri:ro
    environment:
      - SHOGGOTH_NODE_ID=dev-node-02
      - SHOGGOTH_ORCHESTRATOR_ADDR=localhost:9100
      - RUST_LOG=shoggoth=debug

  # Dashboard is a Tauri v2 desktop app — build/run natively, not via Docker.
  # See: apps/shoggoth-desktop/
  #   cd apps/shoggoth-desktop && npm install && npm run tauri dev

# Shoggoth Mesh Machine — Cloud + Auto-Scale Compose
#
# Deploys the orchestrator with cloud auto-scaling. Node agents connect
# remotely. ScyllaDB included for genomic data persistence.
#
# Usage:
#   export BREV_API_KEY=sk-brev-xxxx
#   docker compose -f docker-compose.cloud.yml up -d

version: "3.9"

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: shoggoth-cloud-orchestrator
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /dev/shm/shoggoth:/dev/shm/shoggoth
      - ./deploy/certs:/opt/shoggoth/certs:ro
    environment:
      - SHOGGOTH_ROLE=orchestrator
      - RUST_LOG=shoggoth=info
      - BREV_API_KEY=${BREV_API_KEY:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - SHOGGOTH_CLOUD_MAX_NODES=16
      - SHOGGOTH_CLOUD_BUDGET=50.0
    ports:
      - "9100:9100"
      - "9101:9101"
      - "9102:9102"

  scylla:
    image: scylladb/scylla:6.2
    container_name: shoggoth-cloud-scylla
    restart: unless-stopped
    network_mode: host
    volumes:
      - scylla-cloud-data:/var/lib/scylla
    environment:
      - SCYLLA_CLUSTER_NAME=shoggoth-cloud
      - SCYLLA_DC=cloud-dc1
      - SCYLLA_LISTEN_ADDRESS=0.0.0.0
    command:
      - --smp=16
      - --memory=32G
      - --developer-mode=0

  npu-stack:
    build:
      context: ../npu-stack
      dockerfile: Dockerfile
    container_name: shoggoth-cloud-npu
    restart: unless-stopped
    network_mode: host
    environment:
      - SHOGGOTH_ORCHESTRATOR_ADDR=localhost:9100
      - PYTHONUNBUFFERED=1
    depends_on:
      - orchestrator

  prometheus:
    image: prom/prometheus:v3.0
    container_name: shoggoth-cloud-prometheus
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/shoggoth-alerts.yml:/etc/prometheus/shoggoth-alerts.yml:ro
      - prometheus-cloud-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:11.0
    container_name: shoggoth-cloud-grafana
    restart: unless-stopped
    network_mode: host
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-shoggoth}
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-cloud-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  scylla-cloud-data:
  prometheus-cloud-data:
  grafana-cloud-data:

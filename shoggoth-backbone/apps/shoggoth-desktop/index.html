<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoggoth Launchpad</title>
    <style>
      :root {
        --emerald: #00ff66;
        --steel: #1a1a2e;
        --steel-light: #2a2a4e;
        --steel-dark: #0d0d1a;
        --text-primary: #e0e0e0;
        --text-secondary: #8888aa;
        --accent-amber: #ff9900;
        --accent-red: #ff3344;

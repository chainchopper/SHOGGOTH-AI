# shoggoth-backbone/.cargo/config.toml
#
# Cross-compilation and linker configuration for the Shoggoth Mesh Machine.
# Targets: x86_64-unknown-linux-gnu (Xeon Brain, BC250 nodes),
#          x86_64-pc-windows-msvc (Windows Edge consumers),
#          aarch64-unknown-linux-gnu (Apple Silicon dev, future SBCs).

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "target-cpu=x86-64-v3",  # AVX2, BMI2, FMA — Xeon 6240 baseline
]

[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "target-cpu=x86-64-v3",
]

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[build]
# Enable sparse protocol for faster crate resolution.
rustflags = ["-C", "target-cpu=native"]

[alias]
# Quick development loop.
check-all = "check --workspace --all-targets"
lint = "clippy --workspace --all-targets -- -D warnings"
test-all = "test --workspace"
# Format with nightly rustfmt features.
fmt-all = "fmt --all -- --check"
